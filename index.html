<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deutsch Lernen — Neha's German Course</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#58cc02;--green-dark:#46a302;--green-light:#d7f5a3;
  --blue:#1cb0f6;--blue-dark:#0d8fc5;--blue-light:#d0f0fd;
  --yellow:#ffc800;--yellow-light:#fff3cc;
  --red:#ff4b4b;--red-light:#ffd0d0;
  --purple:#ce82ff;--purple-light:#f0d9ff;
  --gray-100:#f7f7f7;--gray-200:#e5e5e5;--gray-300:#afafaf;
  --gray-700:#3c3c3c;--gray-900:#1a1a1a;
  --white:#ffffff;
  --sidebar-w:260px;
  --radius:16px;--radius-sm:8px;
  --shadow:0 4px 16px rgba(0,0,0,.1);
  --shadow-btn:0 4px 0;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--gray-100);color:var(--gray-900);min-height:100vh;display:flex;overflow-x:hidden}

/* ===== SIDEBAR ===== */
#sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--white);border-right:2px solid var(--gray-200);display:flex;flex-direction:column;position:fixed;left:0;top:0;z-index:100;overflow-y:auto}
.logo{padding:24px 20px 16px;border-bottom:2px solid var(--gray-200)}
.logo h1{font-size:22px;font-weight:800;color:var(--green-dark);letter-spacing:-0.5px}
.logo p{font-size:12px;color:var(--gray-300);margin-top:2px}
.stats-bar{display:flex;gap:12px;padding:14px 20px;border-bottom:2px solid var(--gray-200);background:var(--gray-100)}
.stat{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:700}
.stat .icon{font-size:16px}
.stat.xp{color:#ff9600}
.stat.streak{color:#ff4b4b}
.stat.hearts{color:#ff4b4b}
#sidebar nav{flex:1;padding:12px 0}
.nav-section{padding:8px 20px 4px;font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--gray-300);text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;border-radius:var(--radius-sm);margin:2px 8px;font-size:14px;font-weight:600;color:var(--gray-700);transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--gray-100)}
.nav-item.active{background:var(--green-light);color:var(--green-dark)}
.nav-item .nav-icon{font-size:18px;width:24px;text-align:center}
.nav-item .badge{margin-left:auto;background:var(--green);color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.nav-item .lock{margin-left:auto;opacity:.4;font-size:14px}
.nav-item.locked{opacity:.5;cursor:not-allowed}

/* ===== MAIN ===== */
#main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--white);border-bottom:2px solid var(--gray-200);padding:16px 32px;display:flex;align-items:center;gap:16px}
#topbar h2{font-size:20px;font-weight:800;flex:1}
.progress-wrap{flex:1;max-width:300px}
.progress-track{height:10px;background:var(--gray-200);border-radius:999px;overflow:hidden}
.progress-fill{height:100%;background:var(--green);border-radius:999px;transition:width .4s ease}
.progress-label{font-size:11px;color:var(--gray-300);margin-top:4px;text-align:right}
#content{padding:32px;flex:1;max-width:860px;margin:0 auto;width:100%}

/* ===== HOME SCREEN ===== */
.home-hero{background:linear-gradient(135deg,#58cc02,#1cb0f6);border-radius:var(--radius);padding:36px;color:white;margin-bottom:28px;position:relative;overflow:hidden}
.home-hero::after{content:'🇩🇪';position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:80px;opacity:.3}
.home-hero h2{font-size:28px;font-weight:800;margin-bottom:8px}
.home-hero p{font-size:15px;opacity:.9;max-width:420px}
.home-hero .hero-btn{margin-top:20px;background:white;color:var(--green-dark);border:none;padding:12px 28px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;transition:transform .1s;display:inline-block}
.home-hero .hero-btn:hover{transform:scale(1.03)}
.section-title{font-size:18px;font-weight:800;margin-bottom:16px;color:var(--gray-900)}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.unit-card{background:var(--white);border-radius:var(--radius);padding:20px;cursor:pointer;border:2px solid var(--gray-200);transition:all .2s;position:relative}
.unit-card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow)}
.unit-card.completed{border-color:var(--green);background:var(--green-light)}
.unit-card.locked{opacity:.5;cursor:not-allowed}
.unit-card.locked:hover{transform:none;border-color:var(--gray-200)}
.unit-icon{font-size:32px;margin-bottom:10px}
.unit-title{font-size:14px;font-weight:700;margin-bottom:4px}
.unit-subtitle{font-size:12px;color:var(--gray-300)}
.unit-status{position:absolute;top:12px;right:12px;font-size:16px}
.lesson-path{display:flex;flex-direction:column;gap:12px;align-items:center;margin-bottom:32px}
.path-node{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;border:3px solid transparent;transition:all .2s;position:relative}
.path-node.done{background:var(--green);border-color:var(--green-dark);box-shadow:0 4px 0 var(--green-dark)}
.path-node.current{background:var(--yellow);border-color:#cc9900;box-shadow:0 4px 0 #cc9900;animation:pulse 2s infinite}
.path-node.todo{background:var(--gray-200);border-color:var(--gray-300);box-shadow:0 4px 0 var(--gray-300)}
.path-node:hover{transform:scale(1.1)}
.path-label{font-size:12px;font-weight:700;color:var(--gray-700);margin-top:4px;text-align:center;max-width:80px}
.path-row{display:flex;flex-direction:column;align-items:center}
@keyframes pulse{0%,100%{box-shadow:0 4px 0 #cc9900,0 0 0 0 rgba(255,200,0,.4)}50%{box-shadow:0 4px 0 #cc9900,0 0 0 8px rgba(255,200,0,0)}}

/* ===== LESSON VIEW ===== */
.lesson-header{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.lesson-header .back-btn{background:none;border:2px solid var(--gray-200);border-radius:var(--radius-sm);padding:8px 14px;cursor:pointer;font-size:14px;font-weight:700;color:var(--gray-700);transition:all .15s}
.lesson-header .back-btn:hover{border-color:var(--blue);color:var(--blue)}
.lesson-header h3{font-size:22px;font-weight:800}
.lesson-progress{flex:1;text-align:right;font-size:13px;color:var(--gray-300);font-weight:600}
.lesson-card{background:var(--white);border-radius:var(--radius);padding:32px;margin-bottom:20px;border:2px solid var(--gray-200);box-shadow:var(--shadow)}
.lesson-type-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:16px}
.badge-theory{background:var(--blue-light);color:var(--blue-dark)}
.badge-example{background:var(--yellow-light);color:#996600}
.badge-tip{background:var(--purple-light);color:#7a00cc}
.lesson-card h4{font-size:20px;font-weight:800;margin-bottom:12px;color:var(--gray-900)}
.lesson-card p{font-size:15px;line-height:1.7;color:var(--gray-700)}
.lesson-card p+p{margin-top:10px}

/* grammar table */
.g-table{width:100%;border-collapse:collapse;margin-top:16px;border-radius:var(--radius-sm);overflow:hidden}
.g-table th{background:var(--gray-700);color:white;padding:10px 14px;text-align:left;font-size:13px}
.g-table td{padding:10px 14px;font-size:14px;border-bottom:1px solid var(--gray-200)}
.g-table tr:last-child td{border:none}
.g-table tr:nth-child(even) td{background:var(--gray-100)}
.g-table .highlight{background:var(--yellow-light)!important;font-weight:700}

/* example blocks */
.example-block{background:var(--gray-100);border-left:4px solid var(--green);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:14px 16px;margin:12px 0}
.example-block .de{font-size:16px;font-weight:700;color:var(--gray-900)}
.example-block .hi{font-size:13px;color:var(--gray-300);margin-top:3px}
.example-block .en{font-size:13px;color:var(--blue-dark);margin-top:2px;font-style:italic}
.tip-block{background:var(--purple-light);border-radius:var(--radius-sm);padding:14px 16px;margin:12px 0;display:flex;gap:10px}
.tip-block .tip-icon{font-size:20px;flex-shrink:0}
.tip-block .tip-text{font-size:14px;color:#4a007a;line-height:1.5}
.cognate-badge{display:inline-flex;align-items:center;gap:6px;background:var(--yellow-light);border:1px solid var(--yellow);border-radius:var(--radius-sm);padding:6px 12px;font-size:13px;margin:4px;font-weight:600}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:16px}
.vocab-card{background:var(--gray-100);border:2px solid var(--gray-200);border-radius:var(--radius-sm);padding:12px;cursor:pointer;transition:all .15s;text-align:center}
.vocab-card:hover{border-color:var(--blue);background:var(--blue-light)}
.vocab-card .vc-de{font-size:15px;font-weight:700}
.vocab-card .vc-hi{font-size:12px;color:var(--gray-300);margin-top:2px}
.vocab-card .vc-en{font-size:12px;color:var(--blue-dark);margin-top:1px;font-style:italic}
.vocab-card .vc-article{font-size:11px;font-weight:700;margin-top:4px;padding:2px 6px;border-radius:999px;display:inline-block}
.art-der{background:#ffd0d0;color:#a00}
.art-die{background:#d0f0fd;color:#0060a0}
.art-das{background:var(--green-light);color:var(--green-dark)}
.nav-btn-row{display:flex;justify-content:space-between;margin-top:24px;gap:12px}
.nav-btn-row button{flex:1;padding:14px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-prev{background:var(--gray-200);color:var(--gray-700)}
.btn-prev:hover{background:var(--gray-300)}
.btn-next{background:var(--green);color:white;box-shadow:0 4px 0 var(--green-dark)}
.btn-next:hover{transform:translateY(-1px)}
.btn-next:active{transform:translateY(2px);box-shadow:none}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* ===== QUIZ ENGINE ===== */
.quiz-header{margin-bottom:24px}
.quiz-lives{display:flex;gap:4px;margin-bottom:12px}
.quiz-lives span{font-size:22px}
.quiz-progress-track{height:12px;background:var(--gray-200);border-radius:999px;overflow:hidden}
.quiz-progress-fill{height:100%;background:var(--green);border-radius:999px;transition:width .3s}
.quiz-card{background:var(--white);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);border:2px solid var(--gray-200)}
.quiz-type-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gray-300);margin-bottom:8px}
.quiz-question{font-size:22px;font-weight:800;margin-bottom:8px;line-height:1.3}
.quiz-hint{font-size:14px;color:var(--gray-300);margin-bottom:24px}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.opt-btn{padding:14px 16px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--white);font-size:15px;font-weight:600;cursor:pointer;text-align:left;transition:all .15s;line-height:1.3}
.opt-btn:hover:not(:disabled){border-color:var(--blue);background:var(--blue-light)}
.opt-btn.selected{border-color:var(--blue);background:var(--blue-light)}
.opt-btn.correct{border-color:var(--green);background:var(--green-light);color:var(--green-dark)}
.opt-btn.wrong{border-color:var(--red);background:var(--red-light);color:var(--red)}
.opt-btn:disabled{cursor:default}
.fill-input{width:100%;padding:14px 16px;border:2px solid var(--gray-200);border-radius:var(--radius-sm);font-size:16px;font-weight:600;outline:none;transition:border .15s;margin-bottom:16px}
.fill-input:focus{border-color:var(--blue)}
.fill-input.correct-input{border-color:var(--green);background:var(--green-light)}
.fill-input.wrong-input{border-color:var(--red);background:var(--red-light)}
.submit-btn{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 var(--blue-dark);transition:all .15s}
.submit-btn:hover{transform:translateY(-1px)}
.submit-btn:active{transform:translateY(2px);box-shadow:none}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.feedback-bar{margin-top:16px;padding:16px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;display:flex;align-items:center;gap:10px}
.feedback-bar.correct-fb{background:var(--green-light);color:var(--green-dark);border:2px solid var(--green)}
.feedback-bar.wrong-fb{background:var(--red-light);color:var(--red);border:2px solid var(--red)}
.feedback-bar .fb-icon{font-size:24px}
.fb-detail{font-size:13px;font-weight:400;margin-top:3px;opacity:.8}
.xp-toast{position:fixed;top:80px;right:32px;background:var(--yellow);color:#664400;padding:10px 20px;border-radius:var(--radius-sm);font-weight:800;font-size:15px;box-shadow:var(--shadow);transform:translateX(120%);transition:transform .3s;z-index:999}
.xp-toast.show{transform:translateX(0)}

/* ===== RESULTS SCREEN ===== */
.results-card{background:var(--white);border-radius:var(--radius);padding:40px;text-align:center;box-shadow:var(--shadow);border:2px solid var(--gray-200)}
.results-trophy{font-size:72px;margin-bottom:16px}
.results-card h2{font-size:28px;font-weight:800;margin-bottom:8px}
.results-card .subtitle{color:var(--gray-300);font-size:16px;margin-bottom:28px}
.results-stats{display:flex;justify-content:center;gap:32px;margin-bottom:32px}
.res-stat{text-align:center}
.res-stat .val{font-size:32px;font-weight:800}
.res-stat .lbl{font-size:12px;color:var(--gray-300);font-weight:600;margin-top:4px}
.res-stat.green .val{color:var(--green-dark)}
.res-stat.blue .val{color:var(--blue-dark)}
.res-stat.yellow .val{color:#996600}
.results-actions{display:flex;gap:12px;justify-content:center}
.btn-primary{padding:14px 28px;background:var(--green);color:white;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 var(--green-dark);transition:all .15s}
.btn-primary:hover{transform:translateY(-1px)}
.btn-secondary{padding:14px 28px;background:var(--white);color:var(--gray-700);border:2px solid var(--gray-200);border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-secondary:hover{border-color:var(--blue);color:var(--blue)}

/* ===== FLASHCARD MODE ===== */
.flashcard-wrap{display:flex;flex-direction:column;align-items:center;gap:24px}
.flashcard{width:100%;max-width:480px;height:220px;perspective:1000px;cursor:pointer}
.flashcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;box-shadow:var(--shadow)}
.fc-front{background:var(--white);border:2px solid var(--gray-200)}
.fc-back{background:var(--green-light);border:2px solid var(--green);transform:rotateY(180deg)}
.fc-word{font-size:32px;font-weight:800;margin-bottom:8px}
.fc-article{font-size:14px;font-weight:700;padding:4px 10px;border-radius:999px;margin-bottom:8px}
.fc-hint{font-size:13px;color:var(--gray-300)}
.fc-translation{font-size:22px;font-weight:700;color:var(--green-dark);margin-bottom:6px}
.fc-example{font-size:13px;color:var(--gray-700);text-align:center;line-height:1.5}
.fc-controls{display:flex;gap:12px}
.fc-btn{padding:12px 24px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.fc-know{background:var(--green);color:white;box-shadow:0 4px 0 var(--green-dark)}
.fc-skip{background:var(--gray-200);color:var(--gray-700)}
.fc-counter{font-size:14px;color:var(--gray-300);font-weight:600}

/* ===== ROADMAP ===== */
.rm-hero{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);border-radius:var(--radius);padding:36px;color:white;margin-bottom:28px;position:relative;overflow:hidden}
.rm-hero::after{content:'🗺️';position:absolute;right:28px;top:50%;transform:translateY(-50%);font-size:90px;opacity:.15}
.rm-hero h2{font-size:26px;font-weight:800;margin-bottom:8px}
.rm-hero p{font-size:14px;opacity:.8;max-width:480px;line-height:1.6}
.rm-hero .rm-meta{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.rm-chip{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:999px;padding:5px 14px;font-size:12px;font-weight:700;color:white}

/* timeline strip */
.timeline-strip{display:flex;align-items:center;gap:0;margin-bottom:32px;overflow-x:auto;padding-bottom:8px}
.tl-node{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:90px}
.tl-bubble{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:3px solid transparent;transition:all .2s;color:white;flex-shrink:0}
.tl-bubble.current{box-shadow:0 0 0 4px rgba(255,200,0,.5);animation:tlpulse 2s infinite}
@keyframes tlpulse{0%,100%{box-shadow:0 0 0 4px rgba(255,200,0,.4)}50%{box-shadow:0 0 0 8px rgba(255,200,0,0)}}
.tl-label{font-size:11px;font-weight:700;color:var(--gray-700);text-align:center;line-height:1.3}
.tl-dur{font-size:10px;color:var(--gray-300);text-align:center}
.tl-arrow{font-size:20px;color:var(--gray-300);flex-shrink:0;margin:0 2px;padding-bottom:20px}
.tl-a1{background:#27ae60}
.tl-a2{background:#16a085}
.tl-b1{background:#2980b9}
.tl-b2{background:#8e44ad}
.tl-c1{background:#e67e22}
.tl-c2{background:#f39c12}

/* accordion */
.accord{border:2px solid var(--gray-200);border-radius:var(--radius);margin-bottom:14px;overflow:hidden;transition:border .2s}
.accord.open{border-color:var(--green)}
.accord-head{display:flex;align-items:center;gap:14px;padding:18px 22px;cursor:pointer;background:var(--white);transition:background .15s;user-select:none}
.accord-head:hover{background:var(--gray-100)}
.accord.open .accord-head{background:var(--gray-100)}
.accord-badge{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:white;flex-shrink:0}
.accord-info{flex:1}
.accord-title{font-size:16px;font-weight:800}
.accord-sub{font-size:12px;color:var(--gray-300);margin-top:2px}
.accord-meta{display:flex;gap:8px;align-items:center}
.accord-pill{font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px}
.accord-chevron{font-size:18px;color:var(--gray-300);transition:transform .25s;flex-shrink:0}
.accord.open .accord-chevron{transform:rotate(180deg)}
.accord-body{display:none;padding:0 22px 22px}
.accord.open .accord-body{display:block}

/* inner tabs */
.inner-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;border-bottom:2px solid var(--gray-200);padding-bottom:12px}
.itab{padding:6px 14px;border-radius:999px;border:2px solid var(--gray-200);background:var(--white);font-size:12px;font-weight:700;cursor:pointer;color:var(--gray-700);transition:all .15s}
.itab.active{background:var(--green-light);border-color:var(--green);color:var(--green-dark)}
.itab-panel{display:none}
.itab-panel.active{display:block}

/* resource links */
.res-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-top:10px}
.res-list li{display:flex;align-items:flex-start;gap:8px;font-size:14px;line-height:1.5}
.res-list li::before{content:'→';color:var(--green-dark);font-weight:700;flex-shrink:0;margin-top:1px}
.res-list a{color:var(--blue-dark);text-decoration:none;font-weight:600}
.res-list a:hover{text-decoration:underline}
.res-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--blue-light);color:var(--blue-dark);flex-shrink:0;margin-top:2px}

/* schedule mini table */
.sched-grid{display:grid;grid-template-columns:auto 1fr auto;gap:0;border-radius:var(--radius-sm);overflow:hidden;border:2px solid var(--gray-200);margin-top:10px}
.sched-row{display:contents}
.sched-time{background:var(--gray-700);color:white;padding:9px 14px;font-size:12px;font-weight:700}
.sched-act{background:var(--white);padding:9px 14px;font-size:13px;border-bottom:1px solid var(--gray-200)}
.sched-dur{background:var(--green-light);color:var(--green-dark);padding:9px 12px;font-size:12px;font-weight:700;border-bottom:1px solid var(--gray-200);text-align:right}
.sched-row:last-child .sched-act,.sched-row:last-child .sched-dur,.sched-row:last-child .sched-time{border-bottom:none}

/* weekly grid */
.week-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.day-card{background:var(--white);border:2px solid var(--gray-200);border-radius:var(--radius-sm);padding:14px;border-top:4px solid var(--gray-300)}
.day-card.mon{border-top-color:#2980b9}
.day-card.tue{border-top-color:#27ae60}
.day-card.wed{border-top-color:#e67e22}
.day-card.thu{border-top-color:#8e44ad}
.day-card.fri{border-top-color:#e74c3c}
.day-card.sat{border-top-color:#f39c12}
.day-card.sun{border-top-color:var(--gray-300)}
.day-name{font-size:13px;font-weight:800;margin-bottom:3px}
.day-theme{font-size:11px;font-weight:700;color:var(--gray-300);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.day-tasks{list-style:none;display:flex;flex-direction:column;gap:5px}
.day-tasks li{font-size:12px;color:var(--gray-700);display:flex;gap:6px;align-items:flex-start;line-height:1.4}
.day-tasks li::before{content:'•';color:var(--green-dark);font-weight:800;flex-shrink:0}

/* cognate table */
.cog-table{width:100%;border-collapse:collapse;border-radius:var(--radius-sm);overflow:hidden;margin-top:12px}
.cog-table th{background:#4a007a;color:white;padding:9px 14px;font-size:13px;text-align:left}
.cog-table td{padding:9px 14px;font-size:14px;border-bottom:1px solid var(--gray-200)}
.cog-table tr:last-child td{border:none}
.cog-table tr:nth-child(even) td{background:var(--purple-light)}
.cog-table .de-word{font-weight:800;color:#4a007a}

/* checklist */
.check-section{margin-bottom:16px}
.check-section h5{font-size:14px;font-weight:800;margin-bottom:10px;color:var(--gray-900)}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray-200);cursor:pointer}
.check-item:last-child{border:none}
.check-item input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--green);flex-shrink:0;margin-top:1px}
.check-item label{font-size:13px;color:var(--gray-700);cursor:pointer;line-height:1.5}
.check-item.checked label{text-decoration:line-through;color:var(--gray-300)}

/* cost card */
.cost-card{background:linear-gradient(135deg,var(--yellow-light),#fff9e6);border:2px solid var(--yellow);border-radius:var(--radius);padding:24px}
.cost-card h4{font-size:16px;font-weight:800;margin-bottom:16px;color:#664400}
.cost-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,200,0,.3);font-size:13px}
.cost-row:last-child{border:none;font-weight:800;font-size:15px;padding-top:12px}
.cost-label{color:var(--gray-700)}
.cost-val{font-weight:700;color:#664400}

/* hindi card */
.hindi-card{background:linear-gradient(135deg,var(--purple-light),#f8f0ff);border:2px solid var(--purple);border-radius:var(--radius);padding:24px;margin-bottom:20px}
.hindi-card h4{font-size:16px;font-weight:800;color:#4a007a;margin-bottom:14px}
.adv-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.adv-list li{display:flex;gap:8px;font-size:14px;line-height:1.5;color:var(--gray-700)}
.adv-list li .adv-icon{flex-shrink:0}

/* resource master */
.res-master-table{width:100%;border-collapse:collapse;border-radius:var(--radius-sm);overflow:hidden;margin-top:12px;font-size:13px}
.res-master-table th{background:var(--gray-700);color:white;padding:9px 12px;text-align:left}
.res-master-table td{padding:9px 12px;border-bottom:1px solid var(--gray-200)}
.res-master-table tr:last-child td{border:none}
.res-master-table tr:nth-child(even) td{background:var(--gray-100)}
.res-master-table a{color:var(--blue-dark);font-weight:600;text-decoration:none}
.res-master-table a:hover{text-decoration:underline}
.free-badge{background:var(--green-light);color:var(--green-dark);font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}
.paid-badge{background:var(--yellow-light);color:#664400;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px}

/* ===== RESPONSIVE ===== */
@media(max-width:700px){
  #sidebar{width:64px}
  .logo p,.nav-item span,.stats-bar .stat span:last-child,.nav-section{display:none}
  .logo h1{font-size:14px}

  .nav-item .nav-icon{width:auto}
  #main{margin-left:64px}
  #content{padding:16px}
  .options-grid{grid-template-columns:1fr}
}

/* ===================================================
   STATE
=================================================== */
let state = JSON.parse(localStorage.getItem('dk-state') || '{}');
if (!state.xp) state.xp = 0;
if (!state.streak) state.streak = 0;
if (!state.hearts) state.hearts = 5;
if (!state.completed) state.completed = {};
if (!state.lastDate) state.lastDate = '';

// streak logic
const today = new Date().toDateString();
if (state.lastDate !== today) {
  const yesterday = new Date(Date.now()-86400000).toDateString();
  if (state.lastDate === yesterday) { state.streak++; }
  else if (state.lastDate !== today) { state.streak = state.streak > 0 ? state.streak : 0; }
  state.lastDate = today;
  saveState();
}

function saveState(){localStorage.setItem('dk-state',JSON.stringify(state));}
function updateStatBar(){
  document.getElementById('sb-xp').textContent = state.xp;
  document.getElementById('sb-streak').textContent = state.streak;
  document.getElementById('sb-hearts').textContent = state.hearts;
}
updateStatBar();

/* ===================================================
   SCREEN ROUTER
=================================================== */
let currentLesson = null;
let currentSlide = 0;
let quizData = null;
let quizIdx = 0;
let quizCorrect = 0;
let quizHearts = 3;
let fcIdx = 0;
let fcKnown = 0;

function showScreen(screen, key){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const match = document.querySelector(`[data-screen="${key||screen}"]`);
  if(match) match.classList.add('active');

  const t = document.getElementById('topbar-title');
  if(screen==='home'){ t.textContent='Dashboard'; renderHome(); }
  else if(screen==='roadmap'){ t.textContent='Learning Roadmap A1 → C2'; renderRoadmap(); }
  else if(screen==='lesson'){ t.textContent = LESSONS[key].title; renderLesson(key); }
  else if(screen==='quiz'){ t.textContent='Mixed Quiz'; renderQuiz(); }
  else if(screen==='flashcards'){ t.textContent='Flashcards'; renderFlashcards(); }
  updateOverallProgress();
}

function updateOverallProgress(){
  const total = Object.keys(LESSONS).length;
  const done = Object.keys(state.completed).length;
  const pct = Math.round(done/total*100);
  document.getElementById('overall-progress').style.width = pct+'%';
  document.getElementById('progress-label').textContent = `${done} / ${total} lessons`;
}

/* ===================================================
   HOME SCREEN
=================================================== */
function renderHome(){
  const total = Object.keys(LESSONS).length;
  const done = Object.keys(state.completed).length;
  let html = `
  <div class="home-hero">
    <h2>Willkommen zurück! 👋</h2>
    <p>You're on a ${state.streak}-day streak. Keep going — Germany awaits you!</p>
    <button class="hero-btn" onclick="resumeLearning()">▶ Continue Learning</button>
  </div>
  <div class="section-title">Your A1 Learning Path</div>
  <div style="display:flex;flex-wrap:wrap;gap:16px;margin-bottom:32px;align-items:flex-start">`;

  const lessonKeys = Object.keys(LESSONS);
  lessonKeys.forEach((key,i)=>{
    const L = LESSONS[key];
    const isDone = !!state.completed[key];
    const isNext = !isDone && (i===0 || !!state.completed[lessonKeys[i-1]]);
    html+=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div class="path-node ${isDone?'done':isNext?'current':'todo'}" onclick="${isDone||isNext?`showScreen('lesson','${key}')`:''}">
        ${isDone?'✓':L.icon}
      </div>
      <div class="path-label">${L.title}</div>
    </div>
    ${i<lessonKeys.length-1?'<div style="font-size:24px;color:var(--gray-300);align-self:center;margin-top:-20px">→</div>':''}`;
  });

  html+=`</div>
  <div class="section-title">All Topics</div>
  <div class="unit-grid">`;

  lessonKeys.forEach(key=>{
    const L = LESSONS[key];
    const isDone = !!state.completed[key];
    html+=`
    <div class="unit-card ${isDone?'completed':''}" onclick="showScreen('lesson','${key}')">
      <div class="unit-icon">${L.icon}</div>
      <div class="unit-title">${L.title}</div>
      <div class="unit-subtitle">+${L.xp} XP · ${L.slides.length} slides · ${L.quiz.length} questions</div>
      <div class="unit-status">${isDone?'✅':''}</div>
    </div>`;
  });

  html+=`</div>
  <div class="section-title">Quick Practice</div>
  <div style="display:flex;gap:12px;flex-wrap:wrap">
    <div class="unit-card" onclick="showScreen('flashcards')" style="flex:1;min-width:160px">
      <div class="unit-icon">🃏</div>
      <div class="unit-title">Flashcards</div>
      <div class="unit-subtitle">${FLASHCARDS.length} vocabulary cards</div>
    </div>
    <div class="unit-card" onclick="showScreen('quiz','mixed')" style="flex:1;min-width:160px">
      <div class="unit-icon">🎯</div>
      <div class="unit-title">Mixed Quiz</div>
      <div class="unit-subtitle">Random questions from all topics</div>
    </div>
  </div>`;

  document.getElementById('content').innerHTML = html;
}

function resumeLearning(){
  const keys = Object.keys(LESSONS);
  for(const k of keys){
    if(!state.completed[k]){ showScreen('lesson',k); return; }
  }
  showScreen('quiz','mixed');
}

  currentLesson = key;

}

function renderSlide(){
  const L = LESSONS[currentLesson];
  const slide = L.slides[currentSlide];
  const total = L.slides.length;
  const pct = Math.round((currentSlide/total)*100);

  let body = `
  <div class="lesson-header">
    <button class="back-btn" onclick="showScreen('home')">← Back</button>
    <h3>${L.title}</h3>
    <div class="lesson-progress">Slide ${currentSlide+1} of ${total}</div>
  </div>
  <div class="progress-track" style="margin-bottom:24px">
    <div class="progress-fill" style="width:${pct}%"></div>
  </div>
  <div class="lesson-card">
    <div class="lesson-type-badge badge-${slide.badge}">${badge_icon(slide.badge)} ${slide.badge.toUpperCase()}</div>
    <h4>${slide.title}</h4>
    ${slide.body||''}`;

  if(slide.table){
    body+=renderTable(slide.table);
  }
  if(slide.examples){
    slide.examples.forEach(e=>{
      body+=`<div class="example-block">
        <div class="de">🔊 ${e.de}</div>
        <div class="hi">🇮🇳 ${e.hi}</div>
        <div class="en">🇬🇧 ${e.en}</div>
      </div>`;
    });
  }
  if(slide.tips){
    slide.tips.forEach(t=>{
      body+=`<div class="tip-block"><div class="tip-icon">💡</div><div class="tip-text">${t}</div></div>`;
    });
  }
  if(slide.vocab){
    body+=`<div class="vocab-grid">`;
    slide.vocab.forEach(v=>{
      const artClass = v.art==='der'?'art-der':v.art==='die'?'art-die':v.art==='das'?'art-das':'';
      body+=`<div class="vocab-card">
        <div class="vc-de">${v.de}</div>
        ${v.art?`<div class="vc-article ${artClass}">${v.art}</div>`:''}
        <div class="vc-hi">${v.hi}</div>
        <div class="vc-en">${v.en}</div>
      </div>`;
    });
    body+=`</div>`;
  }

  body+=`</div>
  <div class="nav-btn-row">
    <button class="nav-btn-row btn-prev" onclick="prevSlide()" ${currentSlide===0?'disabled':''} style="flex:1;padding:14px;border-radius:12px;border:2px solid var(--gray-200);background:var(--gray-200);color:var(--gray-700);font-size:15px;font-weight:700;cursor:pointer">← Previous</button>
    <button class="btn-next" onclick="nextSlide()" style="flex:2;padding:14px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer">${currentSlide===L.slides.length-1?'Start Quiz →':'Next →'}</button>
  </div>`;

  document.getElementById('content').innerHTML = body;
}

function badge_icon(b){return{theory:'📖',example:'💬',tip:'💡'}[b]||'📚';}

function renderTable(t){
  let h=`<table class="g-table"><thead><tr>`;
  t.headers.forEach(h2=>h+=`<th>${h2}</th>`);
  h+=`</tr></thead><tbody>`;
  t.rows.forEach(r=>{
    h+=`<tr>`;
    r.forEach((c,i)=>h+=`<td ${i===0?'style="font-weight:700"':''}>${c}</td>`);
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  return h;
}

function nextSlide(){
  const L = LESSONS[currentLesson];
  if(currentSlide < L.slides.length-1){ currentSlide++; renderSlide(); window.scrollTo(0,0); }
  else{ startLessonQuiz(); }
}
function prevSlide(){
  if(currentSlide>0){ currentSlide--; renderSlide(); window.scrollTo(0,0); }
}

/* ===================================================
   QUIZ ENGINE
=================================================== */
function startLessonQuiz(){
  quizData = LESSONS[currentLesson].quiz;
  quizIdx = 0; quizCorrect = 0; quizHearts = 3;
  renderQuizQuestion();
}

function renderQuiz(){
  // Mixed quiz from all lessons
  let all = [];
  Object.values(LESSONS).forEach(L=>all = all.concat(L.quiz));
  // shuffle
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  quizData = all.slice(0,10);
  quizIdx = 0; quizCorrect = 0; quizHearts = 3;
  renderQuizQuestion();
}

function renderQuizQuestion(){
  if(quizIdx >= quizData.length){ renderResults(); return; }
  if(quizHearts <= 0){ renderResults(true); return; }

  const q = quizData[quizIdx];
  const pct = Math.round(quizIdx/quizData.length*100);
  let hearts = '';
  for(let i=0;i<3;i++) hearts += `<span>${i<quizHearts?'❤️':'🖤'}</span>`;

  let html = `
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
    <button onclick="showScreen('home')" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--gray-300)">✕</button>
    <div style="flex:1">
      <div class="quiz-progress-track"><div class="quiz-progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-lives">${hearts}</div>
  </div>
  <div class="quiz-card">
    <div class="quiz-type-label">${q.type==='mc'?'Multiple Choice':'Fill in the Blank'} · Question ${quizIdx+1} of ${quizData.length}</div>
    <div class="quiz-question">${q.q}</div>
    ${q.hint?`<div class="quiz-hint">💡 Hint: ${q.hint}</div>`:''}`;

  if(q.type==='mc'){
    html+=`<div class="options-grid">`;
    q.opts.forEach((o,i)=>{
      html+=`<button class="opt-btn" onclick="checkMC(${i})">${o}</button>`;
    });
    html+=`</div>`;
  } else {
    html+=`<input type="text" class="fill-input" id="fill-ans" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')checkFill()"/>
    <button class="submit-btn" id="submit-btn" onclick="checkFill()">Check Answer</button>`;
  }
  html+=`<div id="feedback"></div></div>`;
  document.getElementById('content').innerHTML = html;
  if(q.type==='fill') setTimeout(()=>document.getElementById('fill-ans')?.focus(),100);
}

function checkMC(idx){
  const q = quizData[quizIdx];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  btns[idx].classList.add(idx===q.ans?'correct':'wrong');
  if(idx!==q.ans) btns[q.ans].classList.add('correct');
  showFeedback(idx===q.ans, q.exp);
  if(idx===q.ans){ giveXP(10); }
  else { quizHearts--; updateStatBar(); }
}

function checkFill(){
  const q = quizData[quizIdx];
  const inp = document.getElementById('fill-ans');
  const val = inp.value.trim();
  const correct = val.toLowerCase() === q.ans.toLowerCase();
  inp.classList.add(correct?'correct-input':'wrong-input');
  inp.disabled = true;
  document.getElementById('submit-btn').disabled = true;
  if(!correct){
    const hint = document.createElement('div');
    hint.style.cssText='font-size:14px;color:var(--red);margin-top:6px;font-weight:600';
    hint.textContent = `Correct answer: ${q.ans}`;
    inp.parentNode.insertBefore(hint, inp.nextSibling);
  }
  showFeedback(correct, q.exp);
  if(correct){ giveXP(10); }
  else { quizHearts--; updateStatBar(); }
}

function showFeedback(correct, exp){
  if(correct) quizCorrect++;
  const fb = document.getElementById('feedback');
  fb.innerHTML = `
  <div class="feedback-bar ${correct?'correct-fb':'wrong-fb'}">
    <span class="fb-icon">${correct?'🎉':'💔'}</span>
    <div>
      <div>${correct?'Correct! Well done!':'Not quite — keep going!'}</div>
      <div class="fb-detail">${exp}</div>
    </div>
  </div>
  <button onclick="nextQuestion()" style="width:100%;margin-top:12px;padding:14px;background:${correct?'var(--green)':'var(--blue)'};color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 ${correct?'var(--green-dark)':'var(--blue-dark)'}">
    ${quizIdx===quizData.length-1?'See Results':'Next Question →'}
  </button>`;
}

function nextQuestion(){ quizIdx++; renderQuizQuestion(); window.scrollTo(0,0); }

function renderResults(outOfHearts=false){
  const pct = Math.round(quizCorrect/quizData.length*100);
  const xpEarned = quizCorrect * 10;
  let trophy = pct>=90?'🏆':pct>=70?'🥇':pct>=50?'🥈':'📚';
  let msg = pct>=90?'Outstanding! You nailed it!':pct>=70?'Great work! Almost perfect!':pct>=50?'Good effort! Keep practicing!':'Keep going — every mistake is learning!';

  // Mark lesson complete if from a lesson
  if(currentLesson && pct>=60){ state.completed[currentLesson]=true; saveState(); }

  document.getElementById('content').innerHTML = `
  <div class="results-card">
    <div class="results-trophy">${trophy}</div>
    <h2>${msg}</h2>
    <p class="subtitle">${outOfHearts?'You ran out of hearts — review the material and try again!':''}</p>
    <div class="results-stats">
      <div class="res-stat green"><div class="val">${quizCorrect}/${quizData.length}</div><div class="lbl">Correct</div></div>
      <div class="res-stat blue"><div class="val">${pct}%</div><div class="lbl">Accuracy</div></div>
      <div class="res-stat yellow"><div class="val">+${xpEarned}</div><div class="lbl">XP Earned</div></div>
    </div>
    <div class="results-actions">
      <button class="btn-primary" onclick="retryQuiz()">🔄 Try Again</button>
      <button class="btn-secondary" onclick="showScreen('home')">🏠 Home</button>
      ${currentLesson?`<button class="btn-secondary" onclick="showScreen('lesson','${getNextLesson()}')">Next Lesson →</button>`:''}
    </div>
  </div>`;

  state.xp += xpEarned;
  state.streak = state.streak || 1;
  saveState(); updateStatBar(); updateOverallProgress();
}

function retryQuiz(){
  if(currentLesson) startLessonQuiz();
  else renderQuiz();
}

function getNextLesson(){
  const keys = Object.keys(LESSONS);
  const idx = keys.indexOf(currentLesson);
  return keys[idx+1] || 'home';
}

  const a1Keys = ['alphabet','greetings','articles','pronouns','present','numbers','family'];

  if(a1Done >= a1Keys.length) return 'A2';

}

// Accordion toggle
function toggleAccord(id){
  const el = document.getElementById(id);
  const wasOpen = el.classList.contains('open');
  document.querySelectorAll('.accord').forEach(a=>a.classList.remove('open'));
  if(!wasOpen) el.classList.add('open');
}

// Inner tab switch
function switchTab(level, tab, btn){
  const body = btn.closest('.accord-body');
  body.querySelectorAll('.itab').forEach(t=>t.classList.remove('active'));
  body.querySelectorAll('.itab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`${level}-${tab}`).classList.add('active');
}

// Scroll to phase card
function rmScrollTo(id){
  const el = document.getElementById(id);
  if(!el) return;
  document.querySelectorAll('.accord').forEach(a=>a.classList.remove('open'));
  el.classList.add('open');
  setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}), 50);
}

// Exam checklist toggle
function toggleCheck(cid){
  const key = 'dk-examchecklist';
  let checks = JSON.parse(localStorage.getItem(key)||'{}');
  checks[cid] = !checks[cid];
  localStorage.setItem(key, JSON.stringify(checks));
  const row = document.getElementById(`ci-${cid}`);
  const cb = row.querySelector('input');
  if(checks[cid]){ row.classList.add('checked'); cb.checked=true; }
  else { row.classList.remove('checked'); cb.checked=false; }
}

          <div class="fc-word">${card.de}</div>
          <span class="vc-article ${artClass}" style="font-size:14px;font-weight:700;padding:4px 10px;border-radius:999px;display:inline-block;margin:6px 0">${card.art}</span>
          <div class="fc-hint" style="font-size:13px;color:var(--gray-300);margin-top:8px">Tap to see meaning</div>
        </div>
        <div class="fc-back">
          <div class="fc-translation">${card.hi}</div>
          <div style="font-size:13px;color:var(--gray-700);font-style:italic;margin-bottom:8px">${card.en}</div>
          <div class="fc-example" style="font-size:13px;background:white;padding:8px 12px;border-radius:8px;color:var(--gray-700)">"${card.ex}"</div>
        </div>
      </div>
    </div>
    <div class="fc-controls">
      <button class="fc-btn fc-skip" onclick="skipCard()">⏭ Skip</button>
      <button class="fc-btn fc-know" onclick="knowCard()">✓ I know this!</button>
    </div>
    <div style="font-size:13px;color:var(--gray-300)">Known: ${fcKnown} · Remaining: ${FLASHCARDS.length-fcIdx}</div>
  </div>`;
}

function knowCard(){ fcKnown++; giveXP(5); fcIdx++; renderFlashcard(); }
function skipCard(){ fcIdx++; renderFlashcard(); }

/* ===================================================
   XP SYSTEM
=================================================== */
function giveXP(amount){
  state.xp += amount;
  saveState(); updateStatBar();
  const toast = document.getElementById('xp-toast');
  toast.textContent = `+${amount} XP ⚡`;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'), 1800);
}

/* ===================================================
   INIT
=================================================== */
updateOverallProgress();
renderHome();
</script>
</body>
</html>
